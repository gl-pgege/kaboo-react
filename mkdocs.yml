site_name: kaboo-react
site_url: https://gl-pgege.github.io/kaboo-react/
site_description: React components + hooks for rendering kaboo multi-agent activity in a CopilotKit app.
repo_url: https://github.com/gl-pgege/kaboo-react
docs_dir: docs

theme:
  name: material
  logo: assets/kaboo-icon.svg
  favicon: assets/kaboo-icon.svg
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - Theming: theming.md
  - Structured renderers: structured-renderers.md
  - References & providers: references.md
  - Human-in-the-loop: hitl.md
  - Activity panel: activity-panel.md
  - CopilotKit subpath: copilotkit-subpath.md
  - Troubleshooting: troubleshooting.md
  - API inventory: api-inventory.md
  - ...
  - Ecosystem: https://gl-pgege.github.io/kaboo-docs/
